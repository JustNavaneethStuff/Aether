global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: orchestrator
    static_configs:
      - targets: ["orchestrator:8001"]
    metrics_path: /metrics

  - job_name: memory-service
    static_configs:
      - targets: ["memory-service:8002"]
    metrics_path: /metrics

  - job_name: response-builder
    static_configs:
      - targets: ["response-builder:8003"]
    metrics_path: /metrics

  - job_name: knowledge-service
    static_configs:
      - targets: ["knowledge-service:8004"]
    metrics_path: /metrics

  - job_name: evaluation-service
    static_configs:
      - targets: ["evaluation-service:8005"]
    metrics_path: /metrics

  - job_name: prompt-registry
    static_configs:
      - targets: ["prompt-registry:8006"]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
